<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WELIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb1"></div>
    <div class="bg-orb orb2"></div>
    <header class="topbar glass">
      <div class="brand">WELIN</div>
      <div class="controls">
        <select id="langSelect" class="control">
          <option value="en">EN</option>
          <option value="ru">RU</option>
        </select>
        <button id="themeToggle" class="control"></button>
      </div>
    </header>

    <main class="layout">
      <section id="authSection" class="card glass auth"></section>

      <section id="appSection" class="hidden">
        <aside class="sidebar card glass">
          <div id="meCard"></div>
          <button id="logoutBtn" class="btn ghost"></button>
        </aside>

        <section class="content">
          <div class="card glass composer" id="composer"></div>
          <div class="card glass search" id="search"></div>
          <div class="card glass profile" id="profile"></div>
          <div class="card glass feed" id="feed"></div>
          <div id="adminPanel" class="card glass hidden"></div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
